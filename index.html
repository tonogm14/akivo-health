<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Doctor en Casa — Prototipo</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #F4F6F8; }
  body { font-family: -apple-system, "SF Pro Text", "Inter", system-ui, sans-serif; color: #0B1F33; }
  button { font-family: inherit; }

  @keyframes dhPulse {
    0% { transform: translate(-50%,-50%) scale(0.6); opacity: 0.35; }
    100% { transform: translate(-50%,-50%) scale(2.2); opacity: 0; }
  }
  @keyframes dhPulseSolid {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  @keyframes dhRing {
    0% { transform: translate(-50%,-50%) scale(0.6); opacity: 0.6; }
    100% { transform: translate(-50%,-50%) scale(1.4); opacity: 0; }
  }
  @keyframes dhSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes dhMove {
    0% { left: 10%; top: 85%; }
    50% { left: 40%; top: 55%; }
    100% { left: 10%; top: 85%; }
  }
  @keyframes dhFlow {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -480; }
  }
  @keyframes dhSheet {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/tokens.js"></script>
<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>

</body>
</html>
