worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Hide nginx version
  server_tokens off;

  # Basic DDoS protection at proxy level
  limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=2r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # Log format (JSON for structured parsing)
  log_format json escape=json
    '{"ts":"$time_iso8601",'
    '"ip":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"ref":"$http_referer",'
    '"ua":"$http_user_agent",'
    '"rt":"$request_time"}';

  access_log /var/log/nginx/access.log json;
  error_log  /var/log/nginx/error.log  warn;

  # ─────────────────────────────────────────────────────────────
  # Redirect HTTP → HTTPS
  # ─────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name api.doctorhouse.pe admin.doctorhouse.pe;
    return 301 https://$host$request_uri;
  }

  # ─────────────────────────────────────────────────────────────
  # HTTPS termination + reverse proxy to Express
  # ─────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.doctorhouse.pe;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "DENY"                               always;
    add_header X-Content-Type-Options     "nosniff"                            always;
    add_header Referrer-Policy            "no-referrer"                        always;

    # Max body size (align with Express limit)
    client_max_body_size 256k;

    # Reject unknown Host headers — only serve our domain
    if ($host != "api.doctorhouse.pe") {
      return 444;
    }

    # ── Global rate limit
    limit_req zone=global burst=60 nodelay;
    limit_conn conn_limit 20;

    # ── Auth endpoints: tighter limit
    location ~ ^/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass         http://api:3000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 15s;
    }

    # ── Health check (no rate limit — used by load balancers)
    location = /health {
      proxy_pass         http://api:3000;
      proxy_set_header   Host $host;
      access_log off;
    }

    # ── Admin panel is only served on admin.doctorhouse.pe
    location ^~ /admin {
      return 301 https://admin.doctorhouse.pe$request_uri;
    }

    # ── All other API routes
    location / {
      proxy_pass         http://api:3000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;

      # Block obvious scanner paths
      location ~* \.(php|asp|aspx|jsp|cgi|env|git|svn)$ {
        return 404;
      }
    }
  }

  # ─────────────────────────────────────────────────────────────
  # Admin subdomain — admin.doctorhouse.pe
  # Proxies to Express; main domain /admin/* is redirected here
  # ─────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name admin.doctorhouse.pe;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "DENY"                               always;
    add_header X-Content-Type-Options     "nosniff"                            always;
    add_header Referrer-Policy            "no-referrer"                        always;

    client_max_body_size 256k;

    if ($host != "admin.doctorhouse.pe") {
      return 444;
    }

    limit_req  zone=global burst=30 nodelay;
    limit_conn conn_limit 10;

    # Redirect bare root to /admin/
    location = / {
      return 301 https://$host/admin/;
    }

    # Tighter rate limit on login endpoint
    location = /admin/login {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass         http://api:3000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 15s;
    }

    # Everything else (admin SPA + all admin API calls)
    location / {
      proxy_pass         http://api:3000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }
  }
}
